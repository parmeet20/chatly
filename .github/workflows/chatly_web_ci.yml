name: ChatlyWeb CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/chatlyweb/**'
      - '.github/workflows/chatly_web_ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/chatlyweb/**'
      - '.github/workflows/chatly_web_ci.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      GITHUB_SHA: ${{ github.sha }}

    defaults:
      run:
        working-directory: apps/chatlyweb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/chatlyweb:${{ github.sha }} \
            .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chatlyweb:${{ github.sha }}

      - name: Tag and push latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/chatlyweb:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/chatlyweb:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/chatlyweb:latest